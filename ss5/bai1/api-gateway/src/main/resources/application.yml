server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: customer-service-route
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customers/**
          filters:
            - AddResponseHeader=X-System-Name, Api-Gateway-System

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.netflix.discovery: DEBUG
    com.example.apigateway: DEBUG

