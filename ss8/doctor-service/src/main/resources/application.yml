server:
  port: 8081

spring:
  application:
    name: doctor-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,ratelimiters
  health:
    ratelimiters:
      enabled: true

resilience4j:
  ratelimiter:
    instances:
      searchDoctorLimit:
        limit-for-period: 5
        limit-refresh-period: 10s
        timeout-duration: 0

logging:
  level:
    io.github.resilience4j: DEBUG
